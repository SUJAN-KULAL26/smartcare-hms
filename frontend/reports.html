<!DOCTYPE html>
<html>
<head>
  <title>SmartCare HMS - Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      min-height:100vh;
      color:white;
      position:relative;
      overflow-x:hidden;
    }

    /* Background Glow */
    body::before, body::after {
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      filter:blur(150px);
      z-index:-1;
    }

    body::before {
      background: rgba(0,123,255,0.3);
      top:-150px;
      left:-150px;
    }

    body::after {
      background: rgba(0,255,255,0.2);
      bottom:-150px;
      right:-150px;
    }

    /* NAVBAR */
   .navbar {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding:15px 20px;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.15);
}


    .navbar a {
      color:#ddd;
      text-decoration:none;
      font-weight:500;
      transition:0.3s;
    }

    .navbar a:hover {
      color:#00c6ff;
    }

    .navbar button {
      margin-left:auto;
      background: linear-gradient(90deg,#00c6ff,#0072ff);
      border:none;
      padding:8px 18px;
      border-radius:25px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    .container {
  max-width: 1200px;
  margin: auto;
  padding: 12px;
}

@media (min-width: 640px) {
  .container {
    padding: 20px;
  }
}

@media (min-width: 1024px) {
  .container {
    padding: 40px;
  }
}

    h3 {
      margin-bottom:20px;
      color:#ddd;
    }

    /* GLASS CARD */
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding:25px;
      border-radius:20px;
      box-shadow:0 20px 40px rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.15);
      margin-bottom:30px;
    }

    /* TABLE */
    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:14px;
      text-align:center;
    }

    th {
      background: rgba(255,255,255,0.15);
      color:#ddd;
    }

    tr {
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    tr:hover {
      background: rgba(255,255,255,0.05);
    }

    .amount {
      color:#00c6ff;
      font-weight:bold;
    }
    @media (max-width:768px){

  .navbar{
    justify-content:center;
  }

  .navbar button{
    width:100%;
    margin-left:0;
  }

}

.navbar a{
  white-space:nowrap;
}

@media (max-width:600px){

  .navbar{
    overflow-x:auto;
    flex-wrap:nowrap;
  }

  .navbar::-webkit-scrollbar{
    display:none;
  }

}
.table-wrapper{
  width:100%;
  overflow-x:auto;
}

@media (max-width:480px){

  body::before,
  body::after{
    width:250px;
    height:250px;
  }

}
  </style>
</head>

<body>

<div class="navbar">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/patients.html">Patients</a>
  <a href="/doctors.html">Doctors</a>
  <a href="/appointments.html">Appointments</a>
  <a href="/billing.html">Billing</a>
  <a href="/reports.html">Reports</a>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="card">
    <h3>Doctor Wise Revenue Report</h3>
    <div class="table-wrapper">
<table>
      <thead>
        <tr>
          <th>Doctor</th>
          <th>Total Revenue</th>
        </tr>
      </thead>
      <tbody id="doctorRevenueTable"></tbody>
    </table>
    </div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const token=localStorage.getItem("token");
const API="https://smartcare-hms-backend.onrender.com/api";

if(!token){
  window.location.href="/";
  return;
}

async function loadDoctorRevenue(){
  const res = await fetch(`${API}/billing/report/doctor-wise`,{
    headers:{ Authorization:"Bearer "+token }
  });

  const data=await res.json();
  const table=document.getElementById("doctorRevenueTable");
  table.innerHTML="";

  if(data.length===0){
    table.innerHTML="<tr><td colspan='2'>No revenue data</td></tr>";
    return;
  }

  data.forEach(d=>{
    table.innerHTML+=`
      <tr>
        <td>${d.doctorName}</td>
        <td class="amount">₹${d.total}</td>
      </tr>`;
  });
}

window.logout=function(){
  localStorage.clear();
  window.location.href="/";
};

loadDoctorRevenue();

});
</script>

</body>
</html>
